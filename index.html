<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjustable Binary RGB & B&W Square Converter</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #2c3e50;
            --border-color: #dddddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #222;
        }

        p.subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .drop-zone {
            border: 2px dashed var(--accent-color);
            border-radius: 8px;
            padding: 30px 20px;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 20px;
        }

        .drop-zone:hover {
            background-color: rgba(44, 62, 80, 0.05);
        }

        .drop-zone p {
            margin: 0;
            font-size: 0.95rem;
            color: #666;
        }

        #fileInput {
            display: none;
        }

        .controls {
            margin: 20px 0;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: bold;
            font-size: 0.9rem;
            color: #444;
        }

        select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
            background: white;
            cursor: pointer;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
            margin: 0;
            cursor: pointer;
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .image-box {
            max-width: 100%;
            max-height: 400px;
            border: 1px solid var(--border-color);
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 4px;
        }

        .image-box img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #1a252f;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Adjustable Binary RGB & Square Crop</h1>
    <p class="subtitle">Crops images to a 1:1 square. Restricts multi-color mode strictly to R, G, B, Black, and White.</p>
    
    <div class="drop-zone" id="dropZone">
        <p>Drag & drop an image here, or <strong>click to browse</strong></p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="resultContainer" class="preview-container hidden">
        <div class="controls">
            <div class="control-group">
                <label for="modeSelect">Processing Mode</label>
                <select id="modeSelect">
                    <option value="luminance">Luminance (Classic B&W)</option>
                    <option value="pureRGB">Pure RGB (Strictly Red, Green, Blue, Black, White)</option>
                    <option value="red">Isolate Red Channel (B&W Output)</option>
                    <option value="green">Isolate Green Channel (B&W Output)</option>
                    <option value="blue">Isolate Blue Channel (B&W Output)</option>
                </select>
            </div>

            <div class="control-group">
                <div class="slider-label">
                    <label for="thresholdSlider">Threshold Balance</label>
                    <span id="thresholdValue" style="font-weight: bold; font-size: 0.9rem;">50%</span>
                </div>
                <input type="range" id="thresholdSlider" min="0" max="255" value="127">
            </div>
        </div>

        <h3>Resulting Square Image</h3>
        <div class="image-box">
            <img id="outputImage" alt="Processed output">
        </div>
        <a id="downloadBtn" class="btn" download="binary-processed-square.png">Download PNG</a>
    </div>
</div>

<canvas id="canvas" class="hidden"></canvas>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const resultContainer = document.getElementById('resultContainer');
    const outputImage = document.getElementById('outputImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const thresholdSlider = document.getElementById('thresholdSlider');
    const thresholdValue = document.getElementById('thresholdValue');
    const modeSelect = document.getElementById('modeSelect');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let originalImg = null;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#1a252f';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = 'var(--accent-color)';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--accent-color)';
        if (e.dataTransfer.files.length > 0) {
            loadImage(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            loadImage(e.target.files[0]);
        }
    });

    thresholdSlider.addEventListener('input', (e) => {
        const val = e.target.value;
        thresholdValue.textContent = Math.round((val / 255) * 100) + '%';
        if (originalImg) processImage();
    });

    modeSelect.addEventListener('change', () => {
        if (originalImg) processImage();
    });

    function loadImage(file) {
        if (!file.type.startsWith('image/')) {
            alert('Please upload an image file.');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            originalImg = new Image();
            originalImg.onload = function() {
                const size = Math.min(originalImg.width, originalImg.height);
                canvas.width = size;
                canvas.height = size;

                processImage();
                resultContainer.classList.remove('hidden');
            };
            originalImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function processImage() {
        const size = canvas.width;
        const threshold = parseInt(thresholdSlider.value);
        const mode = modeSelect.value;

        ctx.clearRect(0, 0, size, size);
        
        let srcX = 0, srcY = 0;
        if (originalImg.width > originalImg.height) {
            srcX = (originalImg.width - originalImg.height) / 2;
        } else {
            srcY = (originalImg.height - originalImg.width) / 2;
        }

        ctx.drawImage(originalImg, srcX, srcY, size, size, 0, 0, size, size);

        const imageData = ctx.getImageData(0, 0, size, size);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            
            let outR = 0, outG = 0, outB = 0;

            switch (mode) {
                case 'luminance':
                    const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                    const binaryLum = lum >= threshold ? 255 : 0;
                    outR = outG = outB = binaryLum;
                    break;

                case 'pureRGB':
                    const maxChannel = Math.max(r, g, b);
                    const minChannel = Math.min(r, g, b);

                    if (minChannel >= threshold) {
                        // All channels crossed the line -> Force White
                        outR = outG = outB = 255;
                    } else if (maxChannel < threshold) {
                        // No channels crossed the line -> Force Black
                        outR = outG = outB = 0;
                    } else {
                        // Only some crossed. Isolate the absolute strongest channel 
                        // to prevent secondary color mixing (Yellow, Cyan, Magenta)
                        if (r >= g && r >= b) {
                            outR = 255; outG = 0; outB = 0; // Pure Red
                        } else if (g >= r && g >= b) {
                            outR = 0; outG = 255; outB = 0; // Pure Green
                        } else {
                            outR = 0; outG = 0; outB = 255; // Pure Blue
                        }
                    }
                    break;
                    
                case 'red':
                    outR = outG = outB = (r >= threshold ? 255 : 0);
                    break;
                    
                case 'green':
                    outR = outG = outB = (g >= threshold ? 255 : 0);
                    break;
                    
                case 'blue':
                    outR = outG = outB = (b >= threshold ? 255 : 0);
                    break;
            }

            data[i]     = outR;
            data[i + 1] = outG;
            data[i + 2] = outB;
        }
        
        ctx.putImageData(imageData, 0, 0);

        const dataUrl = canvas.toDataURL('image/png');
        outputImage.src = dataUrl;
        downloadBtn.href = dataUrl;
    }
</script>

</body>
</html>

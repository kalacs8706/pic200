<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjustable Binary B&W Square Converter</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #2c3e50;
            --border-color: #dddddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #222;
        }

        p.subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .drop-zone {
            border: 2px dashed var(--accent-color);
            border-radius: 8px;
            padding: 30px 20px;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 20px;
        }

        .drop-zone:hover {
            background-color: rgba(44, 62, 80, 0.05);
        }

        .drop-zone p {
            margin: 0;
            font-size: 0.95rem;
            color: #666;
        }

        #fileInput {
            display: none;
        }

        .controls {
            margin: 20px 0;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            margin: 0;
            cursor: pointer;
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .image-box {
            max-width: 100%;
            max-height: 400px;
            border: 1px solid var(--border-color);
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 4px;
        }

        .image-box img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #1a252f;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Adjustable Pure B&W Square Crop</h1>
    <p class="subtitle">Crops original image to a center square and applies a variable threshold.</p>
    
    <div class="drop-zone" id="dropZone">
        <p>Drag & drop an image here, or <strong>click to browse</strong></p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="resultContainer" class="preview-container hidden">
        <div class="controls">
            <div class="slider-label">
                <span>Threshold (Black vs White)</span>
                <span id="thresholdValue">50%</span>
            </div>
            <input type="range" id="thresholdSlider" min="0" max="255" value="127">
        </div>

        <h3>Resulting Square Image</h3>
        <div class="image-box">
            <img id="outputImage" alt="Processed output">
        </div>
        <a id="downloadBtn" class="btn" download="binary-square.png">Download PNG</a>
    </div>
</div>

<canvas id="canvas" class="hidden"></canvas>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const resultContainer = document.getElementById('resultContainer');
    const outputImage = document.getElementById('outputImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const thresholdSlider = document.getElementById('thresholdSlider');
    const thresholdValue = document.getElementById('thresholdValue');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let originalImg = null;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#1a252f';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = 'var(--accent-color)';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--accent-color)';
        if (e.dataTransfer.files.length > 0) {
            loadImage(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            loadImage(e.target.files[0]);
        }
    });

    thresholdSlider.addEventListener('input', (e) => {
        const val = e.target.value;
        // Update percentage text
        thresholdValue.textContent = Math.round((val / 255) * 100) + '%';
        if (originalImg) {
            applyBinaryThreshold(parseInt(val));
        }
    });

    function loadImage(file) {
        if (!file.type.startsWith('image/')) {
            alert('Please upload an image file.');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            originalImg = new Image();
            originalImg.onload = function() {
                // Determine the square size based on the shortest dimension (no downscaling)
                const size = Math.min(originalImg.width, originalImg.height);
                canvas.width = size;
                canvas.height = size;

                // Apply threshold using the slider's current value
                applyBinaryThreshold(parseInt(thresholdSlider.value));
                resultContainer.classList.remove('hidden');
            };
            originalImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function applyBinaryThreshold(threshold) {
        const size = canvas.width;
        ctx.clearRect(0, 0, size, size);
        
        // Calculate centered cropping coordinates from original image
        let srcX = 0;
        let srcY = 0;
        if (originalImg.width > originalImg.height) {
            srcX = (originalImg.width - originalImg.height) / 2;
        } else {
            srcY = (originalImg.height - originalImg.width) / 2;
        }

        // Draw original cropped section onto canvas at 1:1 scale
        ctx.drawImage(originalImg, srcX, srcY, size, size, 0, 0, size, size);

        // Fetch image data to manipulate pixels
        const imageData = ctx.getImageData(0, 0, size, size);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            
            // Standard perceived brightness formula
            const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            
            // Evaluate against the user's custom threshold
            const binaryColor = luminance >= threshold ? 255 : 0;
            
            data[i]     = binaryColor; // R
            data[i + 1] = binaryColor; // G
            data[i + 2] = binaryColor; // B
        }
        
        ctx.putImageData(imageData, 0, 0);

        // Render preview and update download link
        const dataUrl = canvas.toDataURL('image/png');
        outputImage.src = dataUrl;
        downloadBtn.href = dataUrl;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Black & White Converter (200x200)</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #e67e22;
            --border-color: #dddddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #222;
        }

        p.subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .drop-zone {
            border: 2px dashed var(--accent-color);
            border-radius: 8px;
            padding: 30px 20px;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 20px;
        }

        .drop-zone:hover {
            background-color: rgba(230, 126, 34, 0.05);
        }

        .drop-zone p {
            margin: 0;
            font-size: 0.95rem;
            color: #666;
        }

        #fileInput {
            display: none;
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .image-box {
            width: 200px;
            height: 200px;
            border: 1px solid var(--border-color);
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 4px;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Squares it off cleanly without stretching */
            image-rendering: pixelated; /* Keeps the pure pixels crisp */
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #d35400;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Binary B&W Converter</h1>
    <p class="subtitle">Resizes to 200x200 and limits colors to strictly 0 or 255 brightness.</p>
    
    <div class="drop-zone" id="dropZone">
        <p>Drag & drop an image here, or <strong>click to browse</strong></p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="resultContainer" class="preview-container hidden">
        <h3>Converted Result (200x200)</h3>
        <div class="image-box">
            <img id="outputImage" alt="Processed output">
        </div>
        <a id="downloadBtn" class="btn" download="binary-image.png">Download PNG</a>
    </div>
</div>

<canvas id="canvas" width="200" height="200" class="hidden"></canvas>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const resultContainer = document.getElementById('resultContainer');
    const outputImage = document.getElementById('outputImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#d35400';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = 'var(--accent-color)';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--accent-color)';
        if (e.dataTransfer.files.length > 0) {
            processImage(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            processImage(e.target.files[0]);
        }
    });

    function processImage(file) {
        if (!file.type.startsWith('image/')) {
            alert('Please upload an image file.');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                ctx.clearRect(0, 0, 200, 200);
                
                // Square center crop logic
                let srcX = 0, srcY = 0, srcW = img.width, srcH = img.height;
                if (img.width / img.height > 1) {
                    srcW = img.height;
                    srcX = (img.width - img.height) / 2;
                } else {
                    srcH = img.width;
                    srcY = (img.height - img.width) / 2;
                }

                // Render into 200x200 canvas space
                ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, 200, 200);

                const imageData = ctx.getImageData(0, 0, 200, 200);
                const data = imageData.data;

                // Threshold value (128 is mid-way between 0 and 255)
                const threshold = 127.5; 

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    // Calculate perceived brightness
                    const v = (0.2126 * r + 0.7152 * g + 0.0722 * b);
                    
                    // Force binary state: strictly 0 (black) or 255 (white)
                    const binaryColor = v >= threshold ? 255 : 0;
                    
                    data[i]     = binaryColor;
                    data[i + 1] = binaryColor;
                    data[i + 2] = binaryColor;
                    // data[i+3] is alpha channel, kept at original transparency/solid
                }
                
                ctx.putImageData(imageData, 0, 0);

                // Convert canvas to downloadable format
                const dataUrl = canvas.toDataURL('image/png');
                outputImage.src = dataUrl;
                downloadBtn.href = dataUrl;
                
                resultContainer.classList.remove('hidden');
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>

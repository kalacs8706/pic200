<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Square Pixel Visualizer</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-color: #1a1a1e;
            --accent-color: #4f46e5;
            --text-color: #e4e4e7;
            --border-color: #2d2d34;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        p {
            color: #a1a1aa;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 440px;
        }

        .panel {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #file-input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            background: #27272a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #a1a1aa;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .canvas-container {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        canvas {
            background-color: #000;
            border: 1px solid #27272a;
            max-width: 100%;
            height: auto;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .stats {
            font-family: monospace;
            font-size: 0.85rem;
            color: #a1a1aa;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
        }

        .error {
            color: #ef4444;
            background-color: #451a1a;
            border: 1px solid #7f1d1d;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: none;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>Square Pixel Visualizer</h1>
    <p>Auto-crops data into a perfect square grid with adjustable threshold balance.</p>

    <div class="container">
        <div class="panel">
            <input type="file" id="file-input" accept=".txt">
            
            <div class="slider-container">
                <div class="slider-label">
                    <span>Black/White Cutoff (Threshold)</span>
                    <span id="threshold-val">50%</span>
                </div>
                <input type="range" id="threshold-slider" min="0" max="100" value="50">
            </div>
        </div>

        <div id="error-message" class="error"></div>

        <div class="canvas-container">
            <canvas id="pixel-canvas" style="width: 400px; height: 400px;"></canvas>
            
            <div class="stats">
                <div class="stats-row">
                    <span id="stat-filename">No file loaded</span>
                    <span id="stat-dimensions">Grid: 0 x 0</span>
                </div>
                <div class="stats-row">
                    <span id="stat-count">Total items: 0</span>
                    <span id="stat-cropped">Cropped: 0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const thresholdSlider = document.getElementById('threshold-slider');
        const thresholdVal = document.getElementById('threshold-val');
        const canvas = document.getElementById('pixel-canvas');
        const ctx = canvas.getContext('2d');
        const errorMessage = document.getElementById('error-message');
        const statFilename = document.getElementById('stat-filename');
        const statDimensions = document.getElementById('stat-dimensions');
        const statCount = document.getElementById('stat-count');
        const statCropped = document.getElementById('stat-cropped');

        let parsedColors = [];

        // Set up an initial empty preview size
        canvas.width = 200;
        canvas.height = 200;
        ctx.fillStyle = '#27272a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Handle file loading
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                statFilename.textContent = file.name;
                showError("");

                const reader = new FileReader();
                reader.onload = function(evt) {
                    const text = evt.target.result;
                    // Split lines and trim spaces
                    const rawLines = text.split(/\r?\n/);
                    parsedColors = rawLines.map(line => line.trim().toLowerCase()).filter(line => line.length > 0);
                    
                    renderDynamicSquare();
                };
                reader.onerror = function() {
                    showError("Could not read file structure.");
                };
                reader.readAsText(file);
            }
        });

        // Dynamic adjustment listener
        thresholdSlider.addEventListener('input', (e) => {
            thresholdVal.textContent = `${e.target.value}%`;
            if (parsedColors.length > 0) {
                renderDynamicSquare();
            }
        });

        function renderDynamicSquare() {
            const totalItems = parsedColors.length;
            if (totalItems === 0) return;

            // Find the largest perfect square dimension (e.g., sqrt of 40100 -> 200)
            const sideSize = Math.floor(Math.sqrt(totalItems));
            const squareTotal = sideSize * sideSize;

            statDimensions.textContent = `Grid: ${sideSize} x ${sideSize}`;
            statCount.textContent = `Total items: ${totalItems.toLocaleString()}`;
            statCropped.textContent = `Rendered: ${squareTotal.toLocaleString()}`;

            if (totalItems !== squareTotal) {
                showError(`Notice: Cropped ${ (totalItems - squareTotal).toLocaleString() } leftover line(s) to maintain a perfect ${sideSize}x${sideSize} square view.`);
            } else {
                showError("");
            }

            // Update canvas base layout grid 1:1
            canvas.width = sideSize;
            canvas.height = sideSize;

            const imgData = ctx.createImageData(sideSize, sideSize);
            const data = imgData.data;
            const threshold = parseInt(thresholdSlider.value) / 100;

            // Simple parser logic that maps value structures or defaults to black/white balance
            for (let i = 0; i < squareTotal; i++) {
                const colorToken = parsedColors[i];
                let isWhite = true;

                if (colorToken === 'black') {
                    isWhite = false;
                } else if (colorToken === 'white') {
                    isWhite = true;
                } else {
                    // Fallback calculation rule for numerical or random color text assets:
                    // If a sliding percentage rules the value balance:
                    isWhite = (i / squareTotal) >= threshold;
                }

                const pixelColor = isWhite ? 255 : 0;
                const idx = i * 4;
                data[idx]     = pixelColor; // R
                data[idx + 1] = pixelColor; // G
                data[idx + 2] = pixelColor; // B
                data[idx + 3] = 255;        // A
            }

            ctx.putImageData(imgData, 0, 0);
        }

        function showError(msg) {
            if (msg) {
                errorMessage.textContent = msg;
                errorMessage.style.display = 'block';
            } else {
                errorMessage.style.display = 'none';
            }
        }
    </script>
</body>
</html>

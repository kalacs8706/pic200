<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter (B&W + 200x200)</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #4a90e2;
            --border-color: #dddddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #222;
        }

        .drop-zone {
            border: 2px dashed var(--accent-color);
            border-radius: 8px;
            padding: 30px 20px;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 20px;
        }

        .drop-zone:hover {
            background-color: rgba(74, 144, 226, 0.05);
        }

        .drop-zone p {
            margin: 0;
            font-size: 0.95rem;
            color: #666;
        }

        #fileInput {
            display: none;
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .image-box {
            width: 200px;
            height: 200px;
            border: 1px solid var(--border-color);
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 4px;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Keeps it perfectly 200x200 without warping */
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #357abd;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Image Resizer & B&W Converter</h1>
    
    <div class="drop-zone" id="dropZone">
        <p>Drag & drop an image here, or <strong>click to browse</strong></p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="resultContainer" class="preview-container hidden">
        <h3>Converted Result (200x200)</h3>
        <div class="image-box">
            <img id="outputImage" alt="Processed output">
        </div>
        <a id="downloadBtn" class="btn" download="converted-image.png">Download Image</a>
    </div>
</div>

<canvas id="canvas" width="200" height="200" class="hidden"></canvas>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const resultContainer = document.getElementById('resultContainer');
    const outputImage = document.getElementById('outputImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Trigger file input click
    dropZone.addEventListener('click', () => fileInput.click());

    // Drag and drop behavior
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#357abd';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = 'var(--accent-color)';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--accent-color)';
        if (e.dataTransfer.files.length > 0) {
            processImage(e.dataTransfer.files[0]);
        }
    });

    // Handle file selection
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            processImage(e.target.files[0]);
        }
    });

    function processImage(file) {
        if (!file.type.startsWith('image/')) {
            alert('Please select a valid image file.');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // 1. Draw and resize image onto the 200x200 canvas
                // Using object-fit: cover logic mathematically to avoid distortion
                ctx.clearRect(0, 0, 200, 200);
                
                let srcX = 0, srcY = 0, srcW = img.width, srcH = img.height;
                const aspectRatio = img.width / img.height;

                if (aspectRatio > 1) {
                    // Wider than tall: crop sides
                    srcW = img.height;
                    srcX = (img.width - img.height) / 2;
                } else {
                    // Taller than wide: crop top/bottom
                    srcH = img.width;
                    srcY = (img.height - img.width) / 2;
                }

                ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, 200, 200);

                // 2. Convert to Grayscale (Black & White)
                const imageData = ctx.getImageData(0, 0, 200, 200);
                const data = imageData.data;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    // Standard luminance formula for grayscale conversion
                    const grayscale = 0.299 * r + 0.587 * g + 0.114 * b;
                    
                    data[i]     = grayscale; // Red
                    data[i + 1] = grayscale; // Green
                    data[i + 2] = grayscale; // Blue
                    // data[i + 3] is Alpha (transparency), left untouched
                }
                
                ctx.putImageData(imageData, 0, 0);

                // 3. Output the result
                const dataUrl = canvas.toDataURL('image/png');
                outputImage.src = dataUrl;
                downloadBtn.href = dataUrl;
                
                // Show result UI
                resultContainer.classList.remove('hidden');
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
